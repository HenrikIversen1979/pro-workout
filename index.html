<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Pro Workout"/>
  <meta name="theme-color" content="#0a0f1a"/>
  <title>Pro Workout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#0a0f1a;overflow-x:hidden}
    body{-webkit-tap-highlight-color:transparent}
    #root{min-height:100%}
    .pulse{animation:pulse 1.2s ease-in-out infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
    .warn-pulse{animation:wp .5s ease-in-out infinite}
    @keyframes wp{0%,100%{opacity:1}50%{opacity:.5}}
    .btn{border:none;cursor:pointer;border-radius:16px;font-family:'Bebas Neue',Impact,sans-serif;letter-spacing:2px;transition:all .15s;-webkit-tap-highlight-color:transparent}
    .btn:active{transform:scale(.96)}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

const CARDIO_CATALOG=[
  {name:"Jump Rope / High Knees",icon:"🏃",desc:"Drive knees high, stay light on your feet"},
  {name:"Jumping Jacks",icon:"⚡",desc:"Arms fully overhead, keep the pace steady"},
  {name:"Mountain Climbers",icon:"🔥",desc:"Hips down, drive knees to chest alternately"},
  {name:"Burpees",icon:"💥",desc:"Chest to floor, jump at the top — go hard!"},
  {name:"Box Steps / Step Ups",icon:"👟",desc:"Use a step or stair, drive with your legs"},
  {name:"Skater Jumps",icon:"🛼",desc:"Side to side, touch the floor each rep"},
  {name:"Shadow Boxing",icon:"🥊",desc:"Jab, cross, hook — keep moving your feet"},
  {name:"Squat Jumps",icon:"🦵",desc:"Squat deep, explode up, land soft"},
  {name:"Lateral Shuffles",icon:"↔️",desc:"Stay low, shuffle side to side fast"},
  {name:"Butt Kicks",icon:"🦶",desc:"Run in place, kick heels to glutes"},
  {name:"Tuck Jumps",icon:"🆙",desc:"Jump and pull knees to chest at the top"},
  {name:"Speed Skaters",icon:"🏂",desc:"Bound side to side, reach to the floor"},
  {name:"Rowing Machine Sprint",icon:"🚣",desc:"Drive with legs first, lean back, pull hard"},
  {name:"Assault Bike Intervals",icon:"🚴",desc:"Push and pull the handles, all-out effort"},
  {name:"Battle Ropes",icon:"🌊",desc:"Alternate arms, keep waves going end to end"},
  {name:"Kettlebell Swings",icon:"🫳",desc:"Hinge at hips, drive with glutes, swing to chest height"},
  {name:"Box Jumps",icon:"📦",desc:"Jump up, land soft, step back down"},
  {name:"Sled Push",icon:"🏋️",desc:"Low hips, short fast strides, drive hard"},
  {name:"Treadmill Sprint",icon:"🏁",desc:"Max effort, hold on, push the belt"},
  {name:"Jump Lunges",icon:"🦿",desc:"Lunge down, explode up, switch legs midair"},
  {name:"Bear Crawl",icon:"🐻",desc:"Knees 2 inches off floor, move hands and feet opposite"},
  {name:"Stair Climber",icon:"🪜",desc:"Full step, don't lean on rails, drive the glutes"},
];

const STRENGTH_CATALOG=[
  {name:"Dumbbell Bicep Curls",icon:"💪",desc:"Slow up, slow down — full range of motion"},
  {name:"Dumbbell Chest Press",icon:"🏋️",desc:"Flat on floor or bench, press explosively"},
  {name:"Dumbbell Bent-Over Row",icon:"🦾",desc:"Hinge at hips, pull elbows back toward hips"},
  {name:"Dumbbell Shoulder Press",icon:"🏆",desc:"Press overhead, don't arch your lower back"},
  {name:"Dumbbell Tricep Kickbacks",icon:"💎",desc:"Hinge forward, extend arms fully behind you"},
  {name:"Dumbbell Chest Flyes",icon:"🦅",desc:"Wide arc, squeeze at the top, control descent"},
  {name:"Dumbbell Hammer Curls",icon:"🔨",desc:"Neutral grip, elbows pinned to sides"},
  {name:"Dumbbell Upright Row",icon:"🔝",desc:"Pull elbows high, bar to chin level"},
  {name:"Dumbbell Skull Crushers",icon:"💀",desc:"Lower to forehead, extend fully overhead"},
  {name:"Dumbbell Renegade Row",icon:"🤸",desc:"Plank position, row one arm at a time"},
  {name:"Dumbbell Lateral Raise",icon:"🦜",desc:"Arms out to sides, slight bend in elbow"},
  {name:"Dumbbell Pullover",icon:"🌊",desc:"Lie back, arc weight over head to chest"},
  {name:"Barbell Back Squat",icon:"🏗️",desc:"Bar on traps, squat to parallel, drive through heels"},
  {name:"Barbell Deadlift",icon:"⚓",desc:"Flat back, push floor away, lock hips at top"},
  {name:"Pull-Ups",icon:"🧗",desc:"Dead hang start, pull chin over bar, control down"},
  {name:"Cable Lat Pulldown",icon:"📡",desc:"Lean slightly back, pull bar to upper chest"},
  {name:"Barbell Bench Press",icon:"🛏️",desc:"Touch chest lightly, press to lockout"},
  {name:"Cable Seated Row",icon:"🪝",desc:"Sit tall, pull elbows back, squeeze shoulder blades"},
  {name:"Leg Press",icon:"🦵",desc:"Feet shoulder-width, lower until 90°, press through heels"},
  {name:"Cable Tricep Pushdown",icon:"📉",desc:"Elbows pinned, push down to full extension"},
  {name:"Dumbbell Romanian Deadlift",icon:"🌿",desc:"Soft knees, hinge until stretch in hamstrings, drive hips"},
  {name:"Dumbbell Bulgarian Split Squat",icon:"🪑",desc:"Rear foot elevated, drop knee toward floor, stay upright"},
];

const DMT={cardioWork:60,strengthWork:180,rest:60,longRest:90};
const DCT={work:45,rest:15,longRest:60};
const DST={work:180,rest:60,longRest:90};

function makeMixed(t){return[
  {name:"Jump Rope / High Knees",type:"cardio",icon:"🏃",desc:"Drive knees high, stay light on your feet",work:t.cardioWork,rest:t.rest},
  {name:"Dumbbell Bicep Curls",type:"strength",icon:"💪",desc:"Slow up, slow down — full range of motion",work:t.strengthWork,rest:t.rest},
  {name:"Jumping Jacks",type:"cardio",icon:"⚡",desc:"Arms fully overhead, keep the pace steady",work:t.cardioWork,rest:t.rest},
  {name:"Dumbbell Chest Press",type:"strength",icon:"🏋️",desc:"Flat on floor or bench, press explosively",work:t.strengthWork,rest:t.rest},
  {name:"Mountain Climbers",type:"cardio",icon:"🔥",desc:"Hips down, drive knees to chest alternately",work:t.cardioWork,rest:t.rest},
  {name:"Dumbbell Bent-Over Row",type:"strength",icon:"🦾",desc:"Hinge at hips, pull elbows back toward hips",work:t.strengthWork,rest:t.rest},
  {name:"Burpees",type:"cardio",icon:"💥",desc:"Chest to floor, jump at the top — go hard!",work:t.cardioWork,rest:t.rest},
  {name:"Dumbbell Shoulder Press",type:"strength",icon:"🏆",desc:"Press overhead, don't arch your lower back",work:t.strengthWork,rest:t.rest},
];}
function makeCardio(t){return CARDIO_CATALOG.slice(0,6).map(e=>({...e,type:"cardio",work:t.work,rest:t.rest}));}
function makeStrength(t){return STRENGTH_CATALOG.slice(0,6).map(e=>({...e,type:"strength",work:t.work,rest:t.rest}));}

function buildMixedSeq(exercises,longRest){
  const s=[];
  exercises.forEach((ex,i)=>{
    s.push({...ex,phase:"work"});
    if(i<exercises.length-1) s.push({...ex,phase:"rest",name:"REST",icon:"😤",desc:"Shake it out",nextEx:exercises[i+1]});
  });
  s.push({name:"ROUND REST",type:"rest",icon:"😮‍💨",desc:"Breathe deep.",phase:"longrest",work:longRest,rest:0});
  return s;
}
function buildYGIGSeq(exercises,workTime){
  const s=[];
  exercises.forEach((ex,i)=>{
    const nextEx=exercises[i+1]||null;
    s.push({...ex,phase:"work",work:workTime,label:"YOU GO",nextEx:null});
    s.push({...ex,phase:"igo",work:workTime,label:"I GO",nextEx});
  });
  return s;
}
function buildEMOMSeq(exercises){
  const s=[];
  exercises.forEach((ex,i)=>{
    const nextEx=exercises[i+1]||null;
    s.push({...ex,phase:"work",work:30,nextEx:null});
    if(nextEx) s.push({...ex,phase:"transition",work:10,name:"TRANSITION",icon:"➡️",desc:"Get to your next station!",nextEx});
  });
  return s;
}
function calcMins(mode,exercises,rounds,timings){
  if(mode==="mixed"||mode==="cardio"||mode==="strength"){
    return Math.round((exercises.reduce((s,e)=>s+e.work+e.rest,0)+(timings.longRest||90))*rounds/60);
  }
  if(mode==="ygig") return Math.round(exercises.length*(timings.work||30)*2*rounds/60);
  if(mode==="emom") return Math.round(exercises.length*40*rounds/60);
  return 0;
}

function CircleTimer({progress,phase,size,warning,color:oc}){
  size=size||220;
  const r=(size/2)-14,circ=2*Math.PI*r,dash=circ*Math.max(0,Math.min(1,progress));
  const color=oc||(warning?"#ef4444":phase==="work"?"#f97316":phase==="rest"?"#38bdf8":"#a3e635");
  return(
    <svg width={size} height={size} style={{filter:`drop-shadow(0 0 ${warning?32:18}px ${color}77)`}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e293b" strokeWidth={10}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={10}
        strokeLinecap="round" strokeDasharray={`${dash} ${circ}`} strokeDashoffset={0}
        transform={`rotate(-90 ${size/2} ${size/2})`}
        style={{transition:"stroke-dasharray 0.25s linear,stroke 0.4s"}}/>
    </svg>
  );
}

function SwapPicker({type,onSelect,onClose}){
  const cat=type==="cardio"?CARDIO_CATALOG:STRENGTH_CATALOG;
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#111827",borderRadius:"24px 24px 0 0",padding:24,width:"100%",maxWidth:480,maxHeight:"72vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
          <span style={{color:type==="cardio"?"#f97316":"#818cf8",fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:2}}>{type==="cardio"?"🏃 SWAP CARDIO":"🏋️ SWAP STRENGTH"}</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#64748b",fontSize:22,cursor:"pointer"}}>✕</button>
        </div>
        {cat.map((ex,i)=>(
          <div key={i} onClick={()=>onSelect(ex)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px",borderRadius:14,marginBottom:8,background:"#1e293b",cursor:"pointer"}}>
            <span style={{fontSize:22}}>{ex.icon}</span>
            <div><div style={{color:"#f1f5f9",fontFamily:"'DM Sans'",fontWeight:600,fontSize:14}}>{ex.name}</div>
            <div style={{color:"#64748b",fontFamily:"'DM Sans'",fontSize:12}}>{ex.desc}</div></div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AddPicker({filterType,timings,currentNames,onAdd,onClose}){
  const [tab,setTab]=useState(filterType||"cardio");
  const showBoth=!filterType;
  const cat=tab==="cardio"?CARDIO_CATALOG:STRENGTH_CATALOG;
  const avail=cat.filter(e=>!currentNames.includes(e.name));
  function handleAdd(ex){
    const work=tab==="cardio"?(timings.cardioWork||timings.work||60):(timings.strengthWork||timings.work||180);
    onAdd({...ex,type:tab,work,rest:timings.rest||60});
  }
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#111827",borderRadius:"24px 24px 0 0",padding:24,width:"100%",maxWidth:480,maxHeight:"75vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <span style={{color:"#f1f5f9",fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:2}}>ADD EXERCISE</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#64748b",fontSize:22,cursor:"pointer"}}>✕</button>
        </div>
        {showBoth&&(
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            {["cardio","strength"].map(t=>(
              <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"10px",borderRadius:12,border:"none",cursor:"pointer",fontFamily:"'Bebas Neue'",fontSize:16,letterSpacing:1,background:tab===t?(t==="cardio"?"#f97316":"#818cf8"):"#1e293b",color:tab===t?"#fff":"#64748b",transition:"all .15s"}}>
                {t==="cardio"?"🏃 CARDIO":"🏋️ STRENGTH"}
              </button>
            ))}
          </div>
        )}
        {avail.length===0?<div style={{color:"#475569",fontFamily:"'DM Sans'",fontSize:14,textAlign:"center",padding:"20px 0"}}>All exercises already added!</div>
          :avail.map((ex,i)=>(
          <div key={i} onClick={()=>handleAdd(ex)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px",borderRadius:14,marginBottom:8,background:"#1e293b",cursor:"pointer"}}>
            <span style={{fontSize:22}}>{ex.icon}</span>
            <div style={{flex:1}}><div style={{color:"#f1f5f9",fontFamily:"'DM Sans'",fontWeight:600,fontSize:14}}>{ex.name}</div>
            <div style={{color:"#64748b",fontFamily:"'DM Sans'",fontSize:12}}>{ex.desc}</div></div>
            <span style={{color:tab==="cardio"?"#f97316":"#818cf8",fontFamily:"'Bebas Neue'",fontSize:20}}>+</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function TimingRow({label,value,min,max,step,onChange,color}){
  const opts=[];for(let v=min;v<=max;v+=step)opts.push(v);
  const fmt=v=>v>=60?`${Math.floor(v/60)}m${v%60?(v%60)+'s':''}`:`${v}s`;
  return(
    <div style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
        <span style={{color:"#94a3b8",fontFamily:"'DM Sans'",fontSize:13}}>{label}</span>
        <span style={{color:color||"#f97316",fontFamily:"'Bebas Neue'",fontSize:18,letterSpacing:1}}>{fmt(value)}</span>
      </div>
      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
        {opts.map(v=>(
          <button key={v} onClick={()=>onChange(v)} style={{flex:"1 0 auto",minWidth:36,padding:"6px 4px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"'DM Sans'",fontSize:11,fontWeight:600,background:value===v?(color||"#f97316"):"#1e293b",color:value===v?"#fff":"#64748b",transition:"all .15s"}}>
            {fmt(v)}
          </button>
        ))}
      </div>
    </div>
  );
}

function RoundsSelector({rounds,setRounds,totalMin,accent}){
  accent=accent||"#f97316";
  const dark=accent==="#a3e635"||accent==="#38bdf8";
  return(
    <div style={{background:"#111827",borderRadius:18,padding:"16px 20px",marginBottom:16}}>
      <div style={{color:"#64748b",fontFamily:"'DM Sans'",fontSize:12,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Select Rounds</div>
      <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:14}}>
        {[1,2,3].map(n=>(
          <button key={n} className="btn" onClick={()=>setRounds(n)} style={{flex:1,padding:"14px 0",fontSize:28,background:rounds===n?accent:"#1e293b",color:rounds===n?(dark?"#0a0f1a":"#fff"):"#64748b",boxShadow:rounds===n?`0 0 20px ${accent}44`:"none"}}>
            {n}
          </button>
        ))}
      </div>
      <div style={{background:"#0a0f1a",borderRadius:12,padding:"12px",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
        <span style={{fontSize:22}}>⏱</span>
        <div>
          <div style={{color:"#f1f5f9",fontFamily:"'Bebas Neue'",fontSize:32,letterSpacing:2,lineHeight:1}}>{totalMin} MIN</div>
          <div style={{color:"#64748b",fontFamily:"'DM Sans'",fontSize:11}}>estimated total workout</div>
        </div>
      </div>
    </div>
  );
}

function WorkoutTimer({sequence,mode,totalRounds,modeLabel,modeColor,onBack}){
  const [seqIdx,setSeqIdx]=useState(0);
  const [timeLeft,setTimeLeft]=useState(sequence[0]?.work||60);
  const [running,setRunning]=useState(false);
  const [round,setRound]=useState(1);
  const [done,setDone]=useState(false);
  const iRef=useRef(null);
  const aRef=useRef(null);

  const cur=sequence[seqIdx]||sequence[0];
  const totalTime=cur.work||60;
  const progress=totalTime>0?timeLeft/totalTime:0;
  const warning=timeLeft<=10&&timeLeft>0&&running;
  const isResting=cur.phase==="rest"||cur.phase==="longrest";
  const isTransition=cur.phase==="transition";
  const isIGO=cur.phase==="igo";
  const isYGIG=mode==="ygig";
  const isEMOM=mode==="emom";
  const restCountdown=isResting&&warning;
  const showNextBig=isTransition||(isEMOM&&warning&&cur.nextEx);

  const beep=useCallback((freq,dur,vol)=>{
    try{
      if(!aRef.current)aRef.current=new(window.AudioContext||window.webkitAudioContext)();
      const ctx=aRef.current;
      [freq,freq*1.5].forEach((f,idx)=>{
        const osc=ctx.createOscillator(),gain=ctx.createGain();
        osc.connect(gain);gain.connect(ctx.destination);
        osc.frequency.value=f;osc.type=idx===0?"square":"sine";
        gain.gain.setValueAtTime(vol*(idx===0?1:.4),ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);
        osc.start();osc.stop(ctx.currentTime+dur);
      });
    }catch(e){}
  },[]);

  const advance=useCallback(()=>{
    const ni=seqIdx+1;
    if(ni>=sequence.length){
      if(round<totalRounds){setRound(r=>r+1);setSeqIdx(0);setTimeLeft(sequence[0].work);beep(880,.4,1);}
      else{setRunning(false);setDone(true);}
    }else{
      setSeqIdx(ni);const next=sequence[ni];setTimeLeft(next.work||60);
      const f=next.phase==="igo"?550:next.phase==="transition"?440:next.phase==="work"?660:330;
      beep(f,.2,1);
    }
  },[seqIdx,round,totalRounds,beep,sequence]);

  useEffect(()=>{
    if(running){iRef.current=setInterval(()=>{setTimeLeft(t=>{if(t<=1){advance();return 0;}if(t<=10)beep(t<=3?1100:660,t<=3?.22:.14,1);return t-1;});},1000);}
    return()=>clearInterval(iRef.current);
  },[running,advance,beep]);

  function togglePause(){setRunning(r=>!r);beep(550,.12,1);}

  const phaseColor=warning?"#ef4444":isIGO?"#818cf8":isTransition?"#38bdf8":isYGIG?"#f97316":isEMOM?"#a3e635":cur.phase==="work"?modeColor||"#f97316":cur.phase==="rest"?"#38bdf8":"#a3e635";
  const typeTag=cur.type==="cardio"?{label:"CARDIO",bg:"#f97316"}:cur.type==="strength"?{label:"STRENGTH",bg:"#818cf8"}:{label:"REST",bg:"#a3e635"};
  const totalEx=sequence.filter(s=>s.phase==="work").length;

  if(done)return(
    <div style={{width:"100%",maxWidth:440,textAlign:"center"}}>
      <div style={{fontSize:70,marginBottom:10}}>🏆</div>
      <h1 style={{color:"#f97316",fontSize:50,margin:"0 0 4px",letterSpacing:4}}>CRUSHED IT</h1>
      <p style={{color:"#64748b",fontFamily:"'Bebas Neue'",fontSize:18,letterSpacing:3,marginBottom:6}}>{modeLabel}</p>
      <p style={{color:"#94a3b8",fontFamily:"'DM Sans'",fontSize:16,marginBottom:32}}>{totalRounds} round{totalRounds>1?"s":""} · {totalEx} exercises 🔥</p>
      <button className="btn pulse" onClick={onBack} style={{width:"100%",padding:"20px",fontSize:28,background:"#f97316",color:"#fff",marginBottom:12}}>GO AGAIN</button>
      <button className="btn" onClick={onBack} style={{width:"100%",padding:"16px",fontSize:20,background:"#111827",color:"#64748b"}}>BACK TO HOME</button>
    </div>
  );

  const shrink=restCountdown||showNextBig;
  return(
    <div style={{width:"100%",maxWidth:440,textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center"}}>
      <div style={{display:"flex",justifyContent:"space-between",width:"100%",marginBottom:10}}>
        <button className="btn" onClick={onBack} style={{background:"#1e293b",color:"#64748b",padding:"8px 16px",fontSize:14}}>← BACK</button>
        <div style={{color:"#64748b",fontFamily:"'DM Sans'",fontSize:13,alignSelf:"center"}}>Round {round} / {totalRounds}</div>
      </div>
      <div style={{background:phaseColor+"22",border:`1px solid ${phaseColor}55`,borderRadius:12,padding:"5px 22px",marginBottom:10}}>
        <span style={{color:phaseColor,fontSize:18,letterSpacing:3}}>
          {isYGIG?(isIGO?"I GO":"YOU GO"):isTransition?"MOVE STATIONS":isEMOM?"EMOM":cur.phase==="work"?"WORK":cur.phase==="rest"?"REST":"LONG REST"}
        </span>
      </div>
      <div style={{position:"relative",width:shrink?110:220,height:shrink?110:220,marginBottom:shrink?6:10,transition:"width .4s ease,height .4s ease",flexShrink:0}}>
        <CircleTimer progress={progress} phase={cur.phase} warning={warning} size={shrink?110:220} color={phaseColor}/>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div className={warning?"warn-pulse":""} style={{fontSize:shrink?36:72,color:warning?"#ef4444":"#f1f5f9",lineHeight:1,fontWeight:"bold",transition:"font-size .3s ease"}}>{timeLeft}</div>
          {!shrink&&<div style={{fontSize:12,color:warning?"rgba(239,68,68,.53)":"#64748b",fontFamily:"'DM Sans'"}}>{warning?"ALMOST DONE!":"seconds"}</div>}
        </div>
      </div>
      <div style={{background:"#111827",borderRadius:22,padding:"16px 20px",width:"100%",marginBottom:12}}>
        {isTransition&&cur.nextEx&&(
          <div style={{textAlign:"center"}}>
            <div style={{color:"#38bdf8",fontFamily:"'Bebas Neue'",fontSize:13,letterSpacing:3,marginBottom:8}}>MOVE TO NEXT STATION — {timeLeft}s</div>

function ExList({exercises,editMode,fmtTime,onSwap,onRemove,minLen}){
  return exercises.map((ex,i)=>(
    <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 4px",borderBottom:i<exercises.length-1?"1px solid #1e293b":"none"}}>
      <span style={{fontSize:18}}>{ex.icon}</span>
      <div style={{flex:1,textAlign:"left"}}>
        <div style={{color:"#e2e8f0",fontFamily:"'DM Sans'",fontWeight:600,fontSize:13}}>{ex.name}</div>
        <div style={{color:"#475569",fontFamily:"'DM Sans'",fontSize:11}}>{fmtTime(ex.work)} work · {fmtTime(ex.rest)} rest</div>
      </div>
      <span style={{fontSize:10,fontFamily:"'DM Sans'",padding:"3px 8px",borderRadius:8,flexShrink:0,background:ex.type==="cardio"?"rgba(124,45,18,.13)":"rgba(49,46,129,.13)",color:ex.type==="cardio"?"#f97316":"#818cf8"}}>{ex.type==="cardio"?"CARDIO":"WEIGHTS"}</span>
      {editMode&&<div style={{display:"flex",gap:5,flexShrink:0}}>
        <button className="btn" onClick={()=>onSwap(i)} style={{background:"#1e293b",color:"#818cf8",padding:"5px 10px",fontSize:13,borderRadius:10}}>↺</button>
        <button className="btn" onClick={()=>onRemove(i)} style={{background:exercises.length>minLen?"rgba(69,10,10,.33)":"#1e293b",color:exercises.length>minLen?"#f87171":"#334155",padding:"5px 10px",fontSize:13,borderRadius:10}}>✕</button>
      </div>}
    </div>
  ));
}

function MixedSetup({onStart,onBack}){
  const [timings,setTimings]=useState(DMT);
  const [exercises,setExercises]=useState(()=>makeMixed(DMT));
  const [editMode,setEditMode]=useState(false);
  const [showTimings,setShowTimings]=useState(false);
  const [swap,setSwap]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [rounds,setRounds]=useState(2);
  function updT(k,v){const t={...timings,[k]:v};setTimings(t);setExercises(p=>p.map(ex=>({...ex,work:ex.type==="cardio"?t.cardioWork:t.strengthWork,rest:t.rest})));}
  function remEx(i){if(exercises.length>2)setExercises(p=>p.filter((_,j)=>j!==i));}
  function repEx(ex){const{index,type}=swap;const work=type==="cardio"?timings.cardioWork:timings.strengthWork;setExercises(p=>p.map((e,i)=>i===index?{...ex,type,work,rest:timings.rest}:e));setSwap(null);}
  function addEx(ex){setExercises(p=>[...p,ex]);setShowAdd(false);}
  const totalMin=calcMins("mixed",exercises,rounds,timings);
  const fmt=v=>v>=60?`${Math.floor(v/60)}m${v%60?(v%60)+'s':''}`:`${v}s`;
  return(
    <div style={{width:"100%",maxWidth:440,textAlign:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
        <button className="btn" onClick={onBack} style={{background:"#1e293b",color:"#64748b",padding:"8px 16px",fontSize:14}}>←</button>
        <h2 style={{color:"#f1f5f9",fontSize:32,letterSpacing:3,margin:0}}>🔀 MIXED</h2>
      </div>
      <div style={{background:"#111827",borderRadius:20,padding:"16px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{color:"#64748b",fontFamily:"'DM Sans'",fontSize:12,textTransform:"uppercase",letterSpacing:1}}>Routine · {exercises.length} exercises</span>
          <div style={{display:"flex",gap:6}}>
            <button className="btn" onClick={()=>{setShowTimings(false);setEditMode(e=>!e);}} style={{background:editMode?"#f97316":"#1e293b",color:editMode?"#fff":"#94a3b8",padding:"5px 14px",fontSize:13,borderRadius:10}}>{editMode?"✓ DONE":"✏ EDIT"}</button>
            <button className="btn" onClick={()=>{setEditMode(false);setShowTimings(t=>!t);}} style={{background:showTimings?"#38bdf8":"#1e293b",color:showTimings?"#fff":"#94a3b8",padding:"5px 14px",fontSize:13,borderRadius:10}}>⏱ TIME</button>
          </div>
        </div>
        {showTimings&&<div style={{background:"#0a0f1a",borderRadius:14,padding:"16px",marginBottom:14}}>
          <TimingRow label="Cardio Work" value={timings.cardioWork} min={30} max={120} step={15} onChange={v=>updT("cardioWork",v)} color="#f97316"/>
          <TimingRow label="Weights Work" value={timings.strengthWork} min={60} max={300} step={30} onChange={v=>updT("strengthWork",v)} color="#818cf8"/>
          <TimingRow label="Rest Between Exercises" value={timings.rest} min={15} max={120} step={15} onChange={v=>updT("rest",v)} color="#38bdf8"/>
          <TimingRow label="Rest Between Rounds" value={timings.longRest} min={30} max={180} step={30} onChange={v=>updT("longRest",v)} color="#a3e635"/>
        </div>}
        <ExList exercises={exercises} editMode={editMode} fmtTime={fmt} onSwap={i=>setSwap({index:i,type:exercises[i].type})} onRemove={remEx} minLen={2}/>
        <button className="btn" onClick={()=>{setEditMode(false);setShowAdd(true);}} style={{width:"100%",marginTop:12,padding:"12px",fontSize:16,background:"#1e293b",color:"#a3e635",border:"1px dashed rgba(163,230,53,.27)",borderRadius:14}}>+ ADD EXERCISE</button>
      </div>
      <RoundsSelector rounds={rounds} setRounds={setRounds} totalMin={totalMin}/>
      <button className="btn pulse" onClick={()=>onStart(buildMixedSeq(exercises,timings.longRest),rounds)} style={{width:"100%",padding:"20px",fontSize:30,background:"#f97316",color:"#fff",marginBottom:8}}>START WORKOUT</button>
      <p style={{color:"#334155",fontFamily:"'DM Sans'",fontSize:12}}>Cardio {fmt(timings.cardioWork)} · Weights {fmt(timings.strengthWork)} · Breaks {fmt(timings.rest)}</p>
      {swap&&<SwapPicker type={swap.type} onSelect={repEx} onClose={()=>setSwap(null)}/>}
      {showAdd&&<AddPicker filterType={null} timings={timings} currentNames={exercises.map(e=>e.name)} onAdd={addEx} onClose={()=>setShowAdd(false)}/>}
    </div>
  );
}

  function remEx(i){if(exercises.length>2)setExercises(p=>p.filter((_,j)=>j!==i));}

          <TimingRow label="Rest Between Exercises" value={timings.rest} min={10} max={120} step={15} onChange={v=>updT("rest",v)} color="#38bdf8"/>

function YGIGSetup({onStart,onBack}){
  const [workTime,setWorkTime]=useState(30);
  const [exercises,setExercises]=useState(()=>makeMixed(DMT).slice(0,4));
  const [editMode,setEditMode]=useState(false);
  const [showTimings,setShowTimings]=useState(false);
  const [swap,setSwap]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [rounds,setRounds]=useState(2);
  const canAdd=exercises.length<6,canRem=exercises.length>4;
  function remEx(i){if(canRem)setExercises(p=>p.filter((_,j)=>j!==i));}
  function repEx(ex){const{index,type}=swap;setExercises(p=>p.map((e,i)=>i===index?{...ex,type,work:workTime,rest:0}:e));setSwap(null);}
  function addEx(ex){if(canAdd){setExercises(p=>[...p,{...ex,work:workTime,rest:0}]);setShowAdd(false);}}
  const totalMin=Math.round(exercises.length*workTime*2*rounds/60);
  const fmt=v=>v>=60?`${Math.floor(v/60)}m${v%60?(v%60)+'s':''}`:`${v}s`;
  return(
    <div style={{width:"100%",maxWidth:440,textAlign:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
        <button className="btn" onClick={onBack} style={{background:"#1e293b",color:"#64748b",padding:"8px 16px",fontSize:14}}>←</button>
        <h2 style={{color:"#a3e635",fontSize:28,letterSpacing:3,margin:0}}>🤝 YOU GO I GO</h2>
      </div>
      <div style={{background:"#111827",borderRadius:16,padding:"12px 16px",marginBottom:14}}>
        <p style={{color:"#64748b",fontFamily:"'DM Sans'",fontSize:13,margin:0}}>One works while the other rests. YOU GO first, then I GO — no dead time. 4–6 exercises. 💪</p>

      <div style={{background:"#111827",borderRadius:20,padding:"16px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{color:"#64748b",fontFamily:"'DM Sans'",fontSize:12,textTransform:"uppercase",letterSpacing:1}}>Exercises · {exercises.length} / 6</span>
          <div style={{display:"flex",gap:6}}>
            <button className="btn" onClick={()=>{setShowTimings(false);setEditMode(e=>!e);}} style={{background:editMode?"#a3e635":"#1e293b",color:editMode?"#0a0f1a":"#94a3b8",padding:"5px 14px",fontSize:13,borderRadius:10}}>{editMode?"✓ DONE":"✏ EDIT"}</button>
            <button className="btn" onClick={()=>{setEditMode(false);setShowTimings(t=>!t);}} style={{background:showTimings?"#38bdf8":"#1e293b",color:showTimings?"#fff":"#94a3b8",padding:"5px 14px",fontSize:13,borderRadius:10}}>⏱ TIME</button>
          </div>
        </div>
        {showTimings&&<div style={{background:"#0a0f1a",borderRadius:14,padding:"16px",marginBottom:14}}>
          <TimingRow label="Work Time Per Person" value={workTime} min={30} max={180} step={15} onChange={v=>setWorkTime(v)} color="#a3e635"/>
        </div>}
        {exercises.map((ex,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 4px",borderBottom:i<exercises.length-1?"1px solid #1e293b":"none"}}>
            <span style={{fontSize:18}}>{ex.icon}</span>
            <div style={{flex:1,textAlign:"left"}}>
              <div style={{color:"#e2e8f0",fontFamily:"'DM Sans'",fontWeight:600,fontSize:13}}>{ex.name}</div>
              <div style={{color:"#475569",fontFamily:"'DM Sans'",fontSize:11}}>YOU {fmt(workTime)} → I {fmt(workTime)}</div>
            </div>
            <span style={{fontSize:10,fontFamily:"'DM Sans'",padding:"3px 8px",borderRadius:8,flexShrink:0,background:ex.type==="cardio"?"rgba(124,45,18,.13)":"rgba(49,46,129,.13)",color:ex.type==="cardio"?"#f97316":"#818cf8"}}>{ex.type==="cardio"?"CARDIO":"WEIGHTS"}</span>
            {editMode&&<div style={{display:"flex",gap:5,flexShrink:0}}>
              <button className="btn" onClick={()=>setSwap({index:i,type:ex.type})} style={{background:"#1e293b",color:"#818cf8",padding:"5px 10px",fontSize:13,borderRadius:10}}>↺</button>
              <button className="btn" onClick={()=>remEx(i)} style={{background:canRem?"rgba(69,10,10,.33)":"#1e293b",color:canRem?"#f87171":"#334155",padding:"5px 10px",fontSize:13,borderRadius:10}}>✕</button>
            </div>}
          </div>
        ))}
        {canAdd&&<button className="btn" onClick={()=>{setEditMode(false);setShowAdd(true);}} style={{width:"100%",marginTop:12,padding:"12px",fontSize:16,background:"#1e293b",color:"#a3e635",border:"1px dashed rgba(163,230,53,.27)",borderRadius:14}}>+ ADD EXERCISE ({exercises.length}/6)</button>}
      </div>
      <RoundsSelector rounds={rounds} setRounds={setRounds} totalMin={totalMin} accent="#a3e635"/>
      <button className="btn pulse" onClick={()=>onStart(buildYGIGSeq(exercises,workTime),rounds)} style={{width:"100%",padding:"20px",fontSize:30,background:"#a3e635",color:"#0a0f1a",marginBottom:8}}>START WORKOUT</button>

      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
        <button className="btn" onClick={onBack} style={{background:"#1e293b",color:"#64748b",padding:"8px 16px",fontSize:14}}>←</button>
        <h2 style={{color:"#38bdf8",fontSize:28,letterSpacing:3,margin:0}}>🕐 EMOM 4×4</h2>
      </div>
      <div style={{background:"#111827",borderRadius:16,padding:"12px 16px",marginBottom:14}}>
        <p style={{color:"#64748b",fontFamily:"'DM Sans'",fontSize:13,margin:"0 0 8px"}}>Every Minute On the Minute — 4 stations, straight through.</p>
        <div style={{display:"flex",gap:8,justifyContent:"center"}}>
          <div style={{background:"rgba(163,230,53,.13)",borderRadius:10,padding:"6px 14px",color:"#a3e635",fontFamily:"'Bebas Neue'",fontSize:16,letterSpacing:1}}>⚡ 30s WORK</div>
          <div style={{background:"rgba(56,189,248,.13)",borderRadius:10,padding:"6px 14px",color:"#38bdf8",fontFamily:"'Bebas Neue'",fontSize:16,letterSpacing:1}}>➡️ 10s MOVE</div>
        </div>
      </div>
      <div style={{background:"#111827",borderRadius:20,padding:"16px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{color:"#64748b",fontFamily:"'DM Sans'",fontSize:12,textTransform:"uppercase",letterSpacing:1}}>4 Stations · Tap ↺ to swap</span>
          <button className="btn" onClick={()=>setEditMode(e=>!e)} style={{background:editMode?"#38bdf8":"#1e293b",color:editMode?"#fff":"#94a3b8",padding:"5px 14px",fontSize:13,borderRadius:10}}>{editMode?"✓ DONE":"✏ SWAP"}</button>
        </div>
        {exercises.map((ex,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 4px",borderBottom:i<exercises.length-1?"1px solid #1e293b":"none"}}>
            <div style={{color:"#38bdf8",fontFamily:"'Bebas Neue'",fontSize:20,minWidth:24,textAlign:"center"}}>{i+1}</div>
            <span style={{fontSize:18}}>{ex.icon}</span>
            <div style={{flex:1,textAlign:"left"}}>
              <div style={{color:"#e2e8f0",fontFamily:"'DM Sans'",fontWeight:600,fontSize:13}}>{ex.name}</div>
              <div style={{color:"#475569",fontFamily:"'DM Sans'",fontSize:11}}>30s work · 10s transition</div>
            </div>
            <span style={{fontSize:10,fontFamily:"'DM Sans'",padding:"3px 8px",borderRadius:8,flexShrink:0,background:ex.type==="cardio"?"rgba(124,45,18,.13)":"rgba(49,46,129,.13)",color:ex.type==="cardio"?"#f97316":"#818cf8"}}>{ex.type==="cardio"?"CARDIO":"WEIGHTS"}</span>
            {editMode&&<button className="btn" onClick={()=>setSwap({index:i,type:ex.type})} style={{background:"#1e293b",color:"#818cf8",padding:"5px 10px",fontSize:13,borderRadius:10}}>↺</button>}
          </div>
        ))}
      </div>
      <RoundsSelector rounds={rounds} setRounds={setRounds} totalMin={totalMin} accent="#38bdf8"/>
      <button className="btn pulse" onClick={()=>onStart(buildEMOMSeq(exercises),rounds)} style={{width:"100%",padding:"20px",fontSize:30,background:"#38bdf8",color:"#0a0f1a",marginBottom:8}}>START EMOM</button>
      {swap&&<SwapPicker type={swap.type} onSelect={repEx} onClose={()=>setSwap(null)}/>}
    </div>
  );
}

const MODES=[
  {id:"mixed",icon:"🔀",label:"MIXED",sub:"Cardio + Strength",color:"#f97316"},
  {id:"cardio",icon:"🏃",label:"CARDIO",sub:"Cardio only",color:"#f97316"},
  {id:"strength",icon:"🏋️",label:"STRENGTH",sub:"Weights only",color:"#818cf8"},
  {id:"ygig",icon:"🤝",label:"YOU GO I GO",sub:"Partner workout",color:"#a3e635"},
  {id:"emom",icon:"🕐",label:"EMOM 4×4",sub:"Every Minute On Minute",color:"#38bdf8"},
];

function ModeSelector({onSelect}){
  return(
    <div style={{width:"100%",maxWidth:440,textAlign:"center"}}>
      <div style={{fontSize:46,marginBottom:2}}>💪</div>
      <h1 style={{color:"#f1f5f9",fontSize:44,margin:"2px 0 0",letterSpacing:5}}>PRO <span style={{color:"#f97316"}}>WORKOUT</span></h1>
      <p style={{color:"#64748b",fontFamily:"'DM Sans'",fontSize:13,margin:"4px 0 24px",letterSpacing:1}}>CHOOSE YOUR WORKOUT MODE</p>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {MODES.map(m=>(
          <button key={m.id} className="btn" onClick={()=>onSelect(m.id)} style={{width:"100%",padding:"18px 20px",background:"#111827",border:`1px solid ${m.color}33`,borderRadius:20,display:"flex",alignItems:"center",gap:16,textAlign:"left"}}>
            <span style={{fontSize:32,minWidth:40,textAlign:"center"}}>{m.icon}</span>
            <div style={{flex:1}}>
              <div style={{color:m.color,fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:3,lineHeight:1}}>{m.label}</div>
              <div style={{color:"#64748b",fontFamily:"'DM Sans'",fontSize:13,marginTop:2}}>{m.sub}</div>
            </div>
            <span style={{color:"#334155",fontSize:20}}>›</span>
          </button>
        ))}
      </div>
    </div>
  );
}

const META={mixed:{label:"MIXED",color:"#f97316"},cardio:{label:"CARDIO",color:"#f97316"},strength:{label:"STRENGTH",color:"#818cf8"},ygig:{label:"YOU GO I GO",color:"#a3e635"},emom:{label:"EMOM 4×4",color:"#38bdf8"}};

function App(){
  const [view,setView]=useState("select");
  const [mode,setMode]=useState(null);
  const [seq,setSeq]=useState([]);
  const [rounds,setRounds]=useState(2);
  function start(s,r){setSeq(s);setRounds(r);setView("workout");}
  return(
    <div style={{minHeight:"100vh",background:"#0a0f1a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"'Bebas Neue',Impact,sans-serif",padding:"20px 16px",boxSizing:"border-box",userSelect:"none"}}>
      {view==="select"&&<ModeSelector onSelect={m=>{setMode(m);setView(`setup-${m}`);}}/>}
      {view==="setup-mixed"&&<MixedSetup onStart={start} onBack={()=>setView("select")}/>}
      {view==="setup-cardio"&&<SingleSetup type="cardio" onStart={start} onBack={()=>setView("select")}/>}
      {view==="setup-strength"&&<SingleSetup type="strength" onStart={start} onBack={()=>setView("select")}/>}
      {view==="setup-ygig"&&<YGIGSetup onStart={start} onBack={()=>setView("select")}/>}
      {view==="setup-emom"&&<EMOMSetup onStart={start} onBack={()=>setView("select")}/>}
      {view==="workout"&&<WorkoutTimer sequence={seq} mode={mode} totalRounds={rounds} modeLabel={META[mode]?.label} modeColor={META[mode]?.color} onBack={()=>setView(`setup-${mode}`)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
